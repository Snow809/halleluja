services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hr_ai?schema=public
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      EMBEDDING_PROVIDER: tei
      EMBEDDING_BASE_URL: http://embeddings:80/v1
      EMBEDDING_MODEL: text-embeddings-inference
      EMBEDDING_DIMENSIONS: 384
      PRESIDIO_ANALYZER_URL: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_URL: http://presidio-anonymizer:3000
      GOTENBERG_URL: http://gotenberg:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      embeddings:
        condition: service_started
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
      gotenberg:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    restart: unless-stopped
    command:
      - --model-id
      - sentence-transformers/all-MiniLM-L6-v2
      - --port
      - "80"
    ports:
      - "8082:80"
    volumes:
      - hf-cache:/data

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    restart: unless-stopped
    ports:
      - "5002:3000"

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    restart: unless-stopped
    ports:
      - "5001:3000"

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3001:3000"

volumes:
  postgres-data:
  minio-data:
  hf-cache:
